<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Druk 3D – przykładowe realizacje</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
    }
    header {
      background: #111;
      color: white;
      padding: 30px;
      text-align: center;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      padding: 30px;
    }
    .card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      overflow: hidden;
      text-align: center;
    }
    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }
    .card h3 {
      margin: 10px 0 5px;
    }
    .card p {
      margin-bottom: 15px;
      color: #666;
    }
    footer {
      text-align: center;
      padding: 30px;
    }
    .cta {
      background: #0088cc;
      color: white;
      padding: 15px 25px;
      border-radius: 30px;
      text-decoration: none;
      font-size: 18px;
    }
    .cta:hover {
      background: #006fa8;
    }
  </style>
</head>
<body>

<header>
  <h1>🖨 Przykładowe wydruki 3D</h1>
  <p>Jakość • Powtarzalność • Realne ceny</p>
</header>

<main class="gallery">

  <div class="card">
    <img src="img/1.png">
    <h3>Obudowa elektroniki</h3>
    <p>PLA • 4h • ~65 zł</p>
  </div>

  <div class="card">
    <img src="img/2.png">
    <h3>Uchwyt techniczny</h3>
    <p>PETG • 6h • ~90 zł</p>
  </div>

  <div class="card">
    <img src="img/3.png">
    <h3>Element dekoracyjny</h3>
    <p>PLA • 8h • ~120 zł</p>
  </div>

</main>

<footer>
  <a class="cta" href="https://t.me/TWOJ_BOT_USERNAME" target="_blank">
    👉 Zamów przez Telegram
  </a>
</footer>

</body>
</html>
